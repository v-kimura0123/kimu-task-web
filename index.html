<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-store, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="theme-color" content="#0b2442">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Kimu Task">
  <title>Kimu Task</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="styles.css?v=18">
  <link rel="stylesheet" href="detail.css?v=18">
</head>
<body>
  <div id="app">
    <aside id="sidebar" class="sidebar">
      <header class="brand"><img src="icon-192.png" alt=""><div><strong>Kimu Task</strong><small>今日を、ちょうどよく。</small></div><button id="closeSidebar" class="icon mobile-only" aria-label="閉じる">×</button></header>
      <nav id="nav"></nav>
      <footer><span id="saveState">● 保存済み</span><span class="sync" id="syncMeta">この端末に保存</span></footer>
    </aside>
    <div id="scrim" class="scrim"></div>
    <main class="main">
      <header class="topbar">
        <button id="menuButton" class="icon mobile-only" aria-label="メニュー">☰</button>
        <div><h1 id="pageTitle">今日</h1><p id="pageSub"></p></div>
        <div class="top-actions"><button id="importButton" class="secondary desktop-only">シート取込</button><button id="exportButton" class="secondary desktop-only">シートへ戻す</button><button id="addButton" class="primary">＋ 仕事を追加</button></div>
      </header>
      <section id="content" class="content"></section>
    </main>
  </div>
  <dialog id="taskDialog" class="sheet"><form method="dialog" id="taskForm"></form></dialog>
  <dialog id="importDialog" class="sheet"><form method="dialog" id="importForm"></form></dialog>
  <div id="toast" class="toast"></div>
  <script type="module" src="app.js?v=18"></script>
  <script src="sync-refresh.js?v=18"></script>
</body>
</html>
